name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip libfontconfig1
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Setup export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]

          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          variant/thread_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=true
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=true
          progressive_web_app/enabled=false
          progressive_web_app/offline_page=""
          progressive_web_app/display=1
          progressive_web_app/orientation=0
          progressive_web_app/icon_144x144=""
          progressive_web_app/icon_180x180=""
          progressive_web_app/background_color=Color(0, 0, 0, 1)
          PRESET
          sed -i 's/^          //' export_presets.cfg

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          sleep 2
          godot --headless --import 2>&1 || true

      - name: Export to Web (manual assembly)
        run: |
          mkdir -p build/web
          TEMPLATES=~/.local/share/godot/export_templates/4.6.1.stable

          # Try normal export first
          godot --headless --export-debug "Web" build/web/index.html 2>&1 && exit 0 || true

          echo "=== Standard export failed, using manual pack + template assembly ==="

          # Export just the pack file (this works even when full export fails)
          godot --headless --export-pack "Web" build/web/index.pck 2>&1 || {
            echo "Pack export also failed, trying alternative..."
            # Create pack directly
            godot --headless --export-pack "Web" build/web/index.pck 2>&1 || true
          }

          # If pack exists, manually assemble web export from templates
          if [ -f build/web/index.pck ]; then
            echo "Pack file created, assembling web build from templates..."
            cd build/web

            # Use nothreads debug template (most compatible, no SharedArrayBuffer needed)
            unzip -o "$TEMPLATES/web_nothreads_debug.zip" -d .

            # Rename template files to match our project
            if [ -f godot.editor.html ]; then
              mv godot.editor.html index.html
            elif [ -f godot.html ]; then
              mv godot.html index.html
            fi

            # Rename all godot.* files to index.*
            for f in godot.*; do
              if [ -f "$f" ]; then
                ext="${f#godot}"
                mv "$f" "index${ext}"
              fi
            done

            # Update HTML to reference index instead of godot
            if [ -f index.html ]; then
              sed -i 's/godot\./index./g' index.html
            fi

            echo "Manual assembly complete"
          else
            echo "ERROR: Could not create pack file"
            exit 1
          fi

      - name: Verify export
        run: |
          echo "Build output:"
          ls -la build/web/
          test -f build/web/index.html || exit 1
          test -f build/web/index.pck || exit 1

      - name: Add coi-serviceworker
        run: |
          cd build/web
          wget -q https://raw.githubusercontent.com/nicbarker/coi-serviceworker/main/coi-serviceworker.min.js -O coi-serviceworker.min.js 2>/dev/null || true
          if [ -f coi-serviceworker.min.js ]; then
            sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
